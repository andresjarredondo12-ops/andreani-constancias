<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conversor Masivo HTML → PDF</title>

<!-- html2canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  padding:30px;
}

.container{
  max-width:1200px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  color:#c1121f;
  margin-bottom:20px;
}

p{
  text-align:center;
  margin-bottom:25px;
  line-height:1.6;
}

.controls{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:25px;
}

input[type=file]{
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#0077ff;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#005dd1;
}

button:disabled{
  background:#888;
}

#fileList{
  margin-top:25px;
  border:1px solid #ccc;
  border-radius:10px;
  overflow:hidden;
}

.file-item{
  padding:12px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
  background:#fafafa;
}

.file-item:nth-child(even){
  background:#f0f0f0;
}

.pending{
  color:orange;
  font-weight:bold;
}

.ok{
  color:green;
  font-weight:bold;
}

.error{
  color:red;
  font-weight:bold;
}

#renderArea{
  position:absolute;
  left:-99999px;
  top:0;
  width:1200px;
  background:white;
}

.info{
  margin-top:20px;
  padding:15px;
  background:#eef6ff;
  border-left:5px solid #0077ff;
  border-radius:8px;
  line-height:1.7;
}

</style>
</head>

<body>

<div class="container">

<h1>Conversor Masivo HTML → PDF</h1>

<p>
Convierte automáticamente carpetas completas de HTML a PDF.
</p>

<div class="controls">

<input
  type="file"
  id="folderInput"
  webkitdirectory
  multiple
>

<button id="loadBtn">
  Cargar Carpeta
</button>

<button id="convertBtn" disabled>
  Convertir Todo
</button>

</div>

<div class="info">

✅ Conversión automática masiva<br>
✅ Descarga automática<br>
✅ Nombre PDF = seguimiento + ID<br>
✅ Sin abrir imprimir<br>
✅ Sin aceptar guardar uno por uno<br>
✅ Extracción automática desde HTML

</div>

<div id="fileList"></div>

</div>

<div id="renderArea"></div>

<script>

const folderInput = document.getElementById("folderInput");
const loadBtn = document.getElementById("loadBtn");
const convertBtn = document.getElementById("convertBtn");
const fileList = document.getElementById("fileList");
const renderArea = document.getElementById("renderArea");

let htmlFiles = [];

loadBtn.addEventListener("click", () => {

  htmlFiles = [];

  const files = Array.from(folderInput.files);

  if(files.length === 0){
    alert("Seleccioná una carpeta.");
    return;
  }

  htmlFiles = files.filter(file => {

    const name = file.name.toLowerCase();

    return (
      name.endsWith(".html") ||
      name.endsWith(".htm")
    );

  });

  if(htmlFiles.length === 0){
    alert("No se encontraron archivos HTML.");
    return;
  }

  renderFileList();

  convertBtn.disabled = false;

});

function renderFileList(){

  fileList.innerHTML = "";

  htmlFiles.forEach((file, index) => {

    const div = document.createElement("div");

    div.className = "file-item";

    div.innerHTML = `
      <span>${file.webkitRelativePath}</span>
      <span class="pending" id="status-${index}">
        Pendiente
      </span>
    `;

    fileList.appendChild(div);

  });

}

convertBtn.addEventListener("click", async () => {

  convertBtn.disabled = true;

  for(let i = 0; i < htmlFiles.length; i++){

    await convertHTML(htmlFiles[i], i);

  }

  alert("Conversión finalizada.");

  convertBtn.disabled = false;

});

async function convertHTML(file, index){

  return new Promise((resolve) => {

    const reader = new FileReader();

    reader.onload = async function(event){

      try{

        const html = event.target.result;

        // Render HTML
        renderArea.innerHTML = html;

        // Esperar imágenes
        await waitImages();

        // Extraer tracking + ID
        const data = extractData(html);

        // Canvas
        const canvas = await html2canvas(renderArea, {
          scale:2,
          useCORS:true,
          allowTaint:true,
          backgroundColor:"#ffffff"
        });

        const imgData = canvas.toDataURL("image/png");

        const { jsPDF } = window.jspdf;

        const pdf = new jsPDF({
          orientation:"p",
          unit:"mm",
          format:"a4"
        });

        const pdfWidth = 210;

        const pdfHeight =
          (canvas.height * pdfWidth) / canvas.width;

        pdf.addImage(
          imgData,
          "PNG",
          0,
          0,
          pdfWidth,
          pdfHeight
        );

        // NOMBRE FINAL
        const finalName =
          `${data.tracking}_ID_${data.id}.pdf`;

        // BLOB
        const blob = pdf.output("blob");

        // URL
        const url = URL.createObjectURL(blob);

        // DESCARGA AUTOMÁTICA
        const a = document.createElement("a");

        a.href = url;

        a.download = finalName;

        document.body.appendChild(a);

        a.click();

        document.body.removeChild(a);

        URL.revokeObjectURL(url);

        document.getElementById(
          `status-${index}`
        ).innerHTML =
          `<span class="ok">Descargado</span>`;

        resolve();

      }
      catch(error){

        console.error(error);

        document.getElementById(
          `status-${index}`
        ).innerHTML =
          `<span class="error">Error</span>`;

        resolve();

      }

    };

    reader.onerror = function(){

      document.getElementById(
        `status-${index}`
      ).innerHTML =
        `<span class="error">Error lectura</span>`;

      resolve();

    };

    reader.readAsText(file);

  });

}

function extractData(html){

  let tracking = "SIN_TRACKING";
  let id = "SIN_ID";

  try{

    // TRACKING
    const trackingMatches =
      html.match(/\b\d{12,25}\b/g);

    if(trackingMatches){

      tracking = trackingMatches[0];

    }

    // ID
    const idRegex =
      /ID[:\s]*([0-9]+)/i;

    const idMatch =
      html.match(idRegex);

    if(idMatch){

      id = idMatch[1];

    }

  }
  catch(error){

    console.error(error);

  }

  return {
    tracking,
    id
  };

}

function waitImages(){

  const images =
    renderArea.querySelectorAll("img");

  const promises = [];

  images.forEach(img => {

    if(img.complete){
      return;
    }

    promises.push(new Promise(resolve => {

      img.onload = resolve;
      img.onerror = resolve;

    }));

  });

  return Promise.all(promises);

}

</script>

</body>
</html>
