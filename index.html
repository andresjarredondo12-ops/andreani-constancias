<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conversor Masivo HTML → PDF</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  padding:30px;
}

.container{
  max-width:1200px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  margin-bottom:20px;
  color:#c1121f;
}

p{
  text-align:center;
  margin-bottom:25px;
}

.controls{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:20px;
}

input[type=file]{
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#0077ff;
  color:white;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#005dd1;
}

button:disabled{
  background:#888;
  cursor:not-allowed;
}

#fileList{
  margin-top:25px;
  border:1px solid #ccc;
  border-radius:10px;
  overflow:hidden;
}

.file-item{
  padding:12px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
  background:#fafafa;
}

.file-item:nth-child(even){
  background:#f0f0f0;
}

.ok{
  color:green;
  font-weight:bold;
}

.error{
  color:red;
  font-weight:bold;
}

.pending{
  color:orange;
  font-weight:bold;
}

iframe{
  width:0;
  height:0;
  border:none;
  position:absolute;
  visibility:hidden;
}

.info{
  margin-top:20px;
  padding:15px;
  background:#eef6ff;
  border-left:5px solid #0077ff;
  border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h1>Conversor Masivo HTML → PDF</h1>

<p>
Subí múltiples archivos HTML o una carpeta completa.
</p>

<div class="controls">

<input
  type="file"
  id="folderInput"
  webkitdirectory
  multiple
>

<button id="loadBtn">
  Cargar HTMLs
</button>

<button id="convertBtn" disabled>
  Convertir a PDF
</button>

</div>

<div class="info">
El navegador abrirá automáticamente el diálogo de impresión
para cada HTML.
</div>

<div id="fileList"></div>

</div>

<iframe id="viewer"></iframe>

<script>

const folderInput = document.getElementById("folderInput");
const loadBtn = document.getElementById("loadBtn");
const convertBtn = document.getElementById("convertBtn");
const fileList = document.getElementById("fileList");
const viewer = document.getElementById("viewer");

let htmlFiles = [];

loadBtn.addEventListener("click", () => {

  htmlFiles = [];

  const files = Array.from(folderInput.files);

  if(files.length === 0){
    alert("Seleccioná una carpeta.");
    return;
  }

  // SOLO HTML REALES
  htmlFiles = files.filter(file => {

    const name = file.name.toLowerCase();

    return (
      name.endsWith(".html") ||
      name.endsWith(".htm")
    );

  });

  if(htmlFiles.length === 0){
    alert("No se encontraron archivos HTML.");
    return;
  }

  renderList();

  convertBtn.disabled = false;

});

function renderList(){

  fileList.innerHTML = "";

  htmlFiles.forEach((file, index) => {

    const div = document.createElement("div");

    div.className = "file-item";

    div.innerHTML = `
      <span>${file.webkitRelativePath || file.name}</span>
      <span class="pending" id="status-${index}">
        Pendiente
      </span>
    `;

    fileList.appendChild(div);

  });

}

convertBtn.addEventListener("click", async () => {

  for(let i = 0; i < htmlFiles.length; i++){

    await processHTML(htmlFiles[i], i);

  }

  alert("Conversión finalizada.");

});

function processHTML(file, index){

  return new Promise((resolve) => {

    try{

      const reader = new FileReader();

      reader.onload = function(event){

        try{

          const html = event.target.result;

          const iframeDoc =
            viewer.contentDocument ||
            viewer.contentWindow.document;

          iframeDoc.open();
          iframeDoc.write(html);
          iframeDoc.close();

          document.getElementById(
            `status-${index}`
          ).innerHTML =
            `<span class="ok">Procesado</span>`;

          setTimeout(() => {

            viewer.contentWindow.focus();

            viewer.contentWindow.print();

            resolve();

          }, 800);

        }
        catch(err){

          document.getElementById(
            `status-${index}`
          ).innerHTML =
            `<span class="error">Error HTML</span>`;

          console.error(err);

          resolve();

        }

      };

      reader.onerror = function(){

        document.getElementById(
          `status-${index}`
        ).innerHTML =
          `<span class="error">Error lectura</span>`;

        resolve();

      };

      reader.readAsText(file);

    }
    catch(err){

      document.getElementById(
        `status-${index}`
      ).innerHTML =
        `<span class="error">Error general</span>`;

      console.error(err);

      resolve();

    }

  });

}

</script>

</body>
</html>
