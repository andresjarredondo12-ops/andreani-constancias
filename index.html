<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>HTML a PDF Exacto</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#f4f4f4;
      padding:40px;
      color:#333;
    }

    .container{
      max-width:1000px;
      margin:auto;
      background:#fff;
      padding:30px;
      border-radius:12px;
      box-shadow:0 0 20px rgba(0,0,0,0.1);
    }

    h1{
      margin-bottom:20px;
      color:#d62828;
      text-align:center;
    }

    p{
      margin-bottom:25px;
      line-height:1.6;
      text-align:center;
    }

    .controls{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
      justify-content:center;
      margin-bottom:25px;
    }

    input[type="file"]{
      padding:10px;
      border:1px solid #ccc;
      border-radius:8px;
      background:#fff;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:8px;
      background:#0077ff;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#005ed1;
    }

    button:disabled{
      background:#999;
      cursor:not-allowed;
    }

    .viewer-container{
      width:100%;
      height:700px;
      border:2px solid #ccc;
      border-radius:10px;
      overflow:hidden;
      background:white;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      background:white;
    }

    .status{
      margin-top:15px;
      text-align:center;
      font-size:14px;
      color:#555;
    }

    @media(max-width:768px){

      body{
        padding:15px;
      }

      .container{
        padding:20px;
      }

      .viewer-container{
        height:500px;
      }

      .controls{
        flex-direction:column;
        align-items:stretch;
      }

      button,
      input[type="file"]{
        width:100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Convertidor HTML → PDF</h1>

    <p>
      Este sistema abre un archivo HTML y permite imprimirlo
      usando el motor real del navegador para guardarlo como PDF.
    </p>

    <div class="controls">

      <input
        type="file"
        id="fileInput"
        accept=".html,.htm"
      >

      <button id="loadBtn">
        Abrir HTML
      </button>

      <button id="printBtn" disabled>
        Guardar como PDF
      </button>

    </div>

    <div class="viewer-container">
      <iframe id="viewer"></iframe>
    </div>

    <div class="status" id="status">
      Esperando archivo HTML...
    </div>

  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const loadBtn = document.getElementById("loadBtn");
    const printBtn = document.getElementById("printBtn");
    const viewer = document.getElementById("viewer");
    const statusText = document.getElementById("status");

    let loaded = false;

    loadBtn.addEventListener("click", () => {

      const file = fileInput.files[0];

      if(!file){
        alert("Selecciona un archivo HTML.");
        return;
      }

      const reader = new FileReader();

      reader.onload = function(e){

        const htmlContent = e.target.result;

        const iframeDoc =
          viewer.contentDocument ||
          viewer.contentWindow.document;

        iframeDoc.open();
        iframeDoc.write(htmlContent);
        iframeDoc.close();

        loaded = true;

        printBtn.disabled = false;

        statusText.textContent =
          "Archivo HTML cargado correctamente.";
      };

      reader.onerror = function(){
        alert("Error leyendo el archivo.");
      };

      reader.readAsText(file);
    });

    printBtn.addEventListener("click", () => {

      if(!loaded){
        alert("Primero debes cargar un HTML.");
        return;
      }

      viewer.contentWindow.focus();

      setTimeout(() => {
        viewer.contentWindow.print();
      }, 500);
    });
  </script>

</body>
</html>
