<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conversor Masivo HTML → PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
  font-family: Arial;
  background:#f4f4f4;
  padding:30px;
}

.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:12px;
}

h1{
  text-align:center;
  color:#c1121f;
}

.controls{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:20px 0;
}

input,button{
  padding:10px;
}

#list{
  margin-top:20px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #ddd;
}

.ok{ color:green; }
.err{ color:red; }
.wait{ color:orange; }

#render{
  position:absolute;
  left:-99999px;
  width:1200px;
}

</style>
</head>

<body>

<div class="container">

<h1>Conversor Masivo HTML → PDF</h1>

<div class="controls">

<input type="file" id="folder" webkitdirectory multiple>

<button id="start">Convertir</button>

</div>

<div id="list"></div>

</div>

<div id="render"></div>

<script>

const folder = document.getElementById("folder");
const start = document.getElementById("start");
const list = document.getElementById("list");
const render = document.getElementById("render");

let files = [];

start.addEventListener("click", async () => {

  files = [...folder.files].filter(f =>
    f.name.endsWith(".html") || f.name.endsWith(".htm")
  );

  renderList();

  await processQueue(files);

});

function renderList(){

  list.innerHTML = "";

  files.forEach((f,i)=>{

    list.innerHTML += `
      <div class="item">
        <span>${f.name}</span>
        <span id="s${i}" class="wait">Pendiente</span>
      </div>
    `;

  });

}

async function processQueue(files){

  for(let i=0;i<files.length;i++){

    await convert(files[i], i);

    // 🔥 CLAVE: delay para evitar bloqueo Chrome
    await new Promise(r => setTimeout(r, 1200));

  }

  alert("Proceso terminado");
}

async function convert(file,index){

  try{

    const text = await file.text();

    render.innerHTML = text;

    await waitImages();

    const { tracking, id } = extractData(text);

    const canvas = await html2canvas(render,{scale:2});

    const img = canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF("p","mm","a4");

    const w = 210;
    const h = canvas.height * w / canvas.width;

    pdf.addImage(img,"PNG",0,0,w,h);

    const name = `${tracking}_ID_${id}.pdf`;

    const blob = pdf.output("blob");

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;
    a.download = name;

    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);

    document.getElementById("s"+index).innerHTML =
      "<span class='ok'>Descargado</span>";

  }catch(e){

    document.getElementById("s"+index).innerHTML =
      "<span class='err'>Error</span>";

  }

}

function extractData(html){

  // ✔ TRACKING (amarillo barcode)
  let tracking = (html.match(/\b\d{18,25}\b/) || [])[0] || "NO_TRACK";

  // ✔ ID (rojo)
  let id = "NO_ID";

  const idMatch = html.match(/ID\s*:\s*(\d+)/i);

  if(idMatch) id = idMatch[1];

  return { tracking, id };

}

function waitImages(){

  const imgs = render.querySelectorAll("img");

  return Promise.all([...imgs].map(img=>{
    if(img.complete) return;
    return new Promise(r=>{
      img.onload = r;
      img.onerror = r;
    });
  }));

}

</script>

</body>
</html>
